<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Still Standing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <h1>Still Standing</h1>
  <div class="buttons">
    <button id="showLogin">Login</button>
    <button id="showSignup">Sign Up</button>
  </div>
</div>

<!-- AUTH FORMS -->
<div id="authForms" class="hidden">
  <div id="loginForm" class="form hidden">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <div id="signupForm" class="form hidden">
    <h2>Sign Up</h2>
    <input id="signupName" placeholder="Name">
    <input id="signupEmail" placeholder="Email">
    <input id="signupPassword" type="password" placeholder="Password">
    <input id="signupDOB" type="date">
    <button id="signupBtn">Create Account</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <header>
    <h2 id="welcome"></h2>
  </header>

  <section id="categories">
    <h3>Life Categories</h3>

    <div class="category" data-file="financial.json"></div>
    <div class="category" data-file="immigration.json"></div>
    <div class="category" data-file="burnout.json"></div>
    <div class="category" data-file="relationships.json"></div>
    <div class="category" data-file="isolation.json"></div>

  </section>
</div>

<script src="app.js"></script>
</body>
</html>
